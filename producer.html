<!DOCTYPE html>
<html>
    <head>
        <title>Producer Page</title>
        <meta charset='utf-8'>
        <meta http-equiv='X-UA-Compatible' content='IE=edge'>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <link rel="stylesheet" href="css/producer.css">
        <link rel="stylesheet" href="css/group12.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>
    <body>
        <div class="navbar">
            <span class="logo">LOGO</span>
            <div class="search">
                <form class="search-bar">
                        <input class="input-bar" type="text" placeholder="Search your music">
                        <i class="search-icon fas fa-search"></i>

                </form>
            </div>
            <i class="fa-solid fa-bars"></i>
        </div>

        <div class="container">
            <div class="section" id="trending">
                <h2>Trending</h2>
                <div class="graph"> 
                    <p>Graph of Trending</p>
                </div>
            </div>
        
            <div class="section" id="most-played">
                <h2>Most Played</h2>
                <div class="list"> 
                    <table>
                        <tr>
                            <th>Song</th>
                            <th>Played</th>
                        </tr>
                        <tr>
                            <td>Star</td>
                            <td>100</td>
                        </tr>
                        <tr>
                            <td>Star</td>
                            <td>100</td>
                        </tr>
                        <tr>
                            <td>Star</td>
                            <td>100</td>
                        </tr>
                    </table>
                </div>
            </div>
        
            <div class="section" id="comments">
                <h2>Comments</h2>
                <div class="comments">
                    <table>
                        <tr>
                            <th>Song</th>
                            <th>Comment</th>
                        </tr>
                        <tr>
                            <td>Star</td>
                            <td>Good....</td>
                        </tr>
                        <tr>
                            <td>Star</td>
                            <td>I love it...</td>
                        </tr>
                        <tr>
                            <td>Star</td>
                            <td>100!!</td>
                        </tr>
                    </table>
                </div>
            </div>
        
            <div class="form-section">
                <form id="music-form">
                    <label>
                        Title: <input type="text" name="title" required>
                    </label>
                    <label>
                        Artist: <input type="text" name="artist" required>
                    </label>
                    <label>
                        Genre: <input type="text" name="genre" required>
                    </label>
                    <label>
                        Description: <textarea name="description" required></textarea>
                    </label>
                    <label>
                        Upload: <input type="file" name="upload" required>
                    </label>
                    <button type="submit" class="submit-button">Submit</button>
                </form>
            </div>
        </div>
        

        <div class="footer">
            <span>COPYRIGHT</span>
            <span>|</span>
            <span>CONTACT US</span>
        </div>

        <audio class="audio-controls" controls src="audio/Oliver Tree - Star.mp3"></audio>
    </body>
</html>
